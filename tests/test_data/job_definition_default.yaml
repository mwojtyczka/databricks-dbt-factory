      - task_key: not_null_zzz_win_loss_records_wins_test
        depends_on:
        - task_key: zzz_win_loss_records_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_win_loss_records_wins
      - task_key: not_null_zzz_win_loss_records_losses_test
        depends_on:
        - task_key: zzz_win_loss_records_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_win_loss_records_losses
      - task_key: dbt_util_country_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_util.country
      - task_key: unit_test_dbt_demo_diamonds_list_colors_test_get_distinct_colors
