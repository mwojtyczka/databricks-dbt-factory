resources:
  jobs:
    dbt_sql_job:
      name: dbt_job
      git_source:
        git_url: https://github.com/mwojtyczka/dbt-demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
      - environment_key: Default
        spec:
          client: '1'
          dependencies:
          - dbt-databricks
      tasks:
      - task_key: diamonds_list_colors_run
        depends_on:
        - task_key: diamonds_four_cs_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.diamonds_list_colors
      - task_key: diamonds_prices_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.diamonds_prices
      - task_key: diamonds_four_cs_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.diamonds_four_cs
      - task_key: zzz_game_details_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.zzz_game_details
      - task_key: second_dbt_model_run
        depends_on:
        - task_key: first_dbt_model_run
        - task_key: unique_first_dbt_model_id_test
        - task_key: not_null_first_dbt_model_id_test
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model2.second_dbt_model
      - task_key: first_dbt_model_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model2.first_dbt_model
      - task_key: zzz_game_details_check_scores_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.zzz_game_details_check_scores
      - task_key: zzz_game_details_check_dates_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.zzz_game_details_check_dates
      - task_key: zzz_win_loss_records_check_records_test
        depends_on:
        - task_key: zzz_win_loss_records_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.zzz_win_loss_records_check_records
      - task_key: diamonds_list_colors_test_test
        depends_on:
        - task_key: diamonds_list_colors_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.diamonds_list_colors_test
      - task_key: country_codes_seed
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt seed --select dbt_demo.country_codes
      - task_key: unique_zzz_game_details_game_id_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.unique_zzz_game_details_game_id
      - task_key: not_null_zzz_game_details_game_id_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_game_id
      - task_key: not_null_zzz_game_details_home_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_home
      - task_key: accepted_values_zzz_game_details_home__Amsterdam__San_Francisco__Seattle_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.accepted_values_zzz_game_details_home__Amsterdam__San_Francisco__Seattle
      - task_key: not_null_zzz_game_details_visitor_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_visitor
      - task_key: accepted_values_zzz_game_details_visitor__Amsterdam__San_Francisco__Seattle_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.accepted_values_zzz_game_details_visitor__Amsterdam__San_Francisco__Seattle
      - task_key: not_null_zzz_game_details_home_score_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_home_score
      - task_key: not_null_zzz_game_details_visitor_score_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_visitor_score
      - task_key: not_null_zzz_game_details_winner_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_winner
      - task_key: accepted_values_zzz_game_details_winner__Amsterdam__San_Francisco__Seattle_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.accepted_values_zzz_game_details_winner__Amsterdam__San_Francisco__Seattle
      - task_key: not_null_zzz_game_details_date_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_date
      - task_key: unique_first_dbt_model_id_test
        depends_on:
        - task_key: first_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.unique_first_dbt_model_id
      - task_key: not_null_first_dbt_model_id_test
        depends_on:
        - task_key: first_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.not_null_first_dbt_model_id
      - task_key: unique_second_dbt_model_id_test
        depends_on:
        - task_key: second_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.unique_second_dbt_model_id
      - task_key: not_null_second_dbt_model_id_test
        depends_on:
        - task_key: second_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.not_null_second_dbt_model_id
      - task_key: not_null_second_dbt_model_amount_usd_test
        depends_on:
        - task_key: second_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.not_null_second_dbt_model_amount_usd
      - task_key: changed_country_run
        depends_on:
        - task_key: country_snapshot_snapshot
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.changed_country
      - task_key: dbt_demo_country_run
        depends_on:
        - task_key: country_codes_seed
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.country
      - task_key: country_snapshot_snapshot
        depends_on:
        - task_key: dbt_demo_country_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt snapshot --select dbt_demo.country_snapshot.country_snapshot
      - task_key: zzz_win_loss_records_run
        depends_on:
        - task_key: zzz_game_details_run
        - task_key: zzz_game_details_check_scores_test
        - task_key: zzz_game_details_check_dates_test
        - task_key: unique_zzz_game_details_game_id_test
        - task_key: not_null_zzz_game_details_game_id_test
        - task_key: not_null_zzz_game_details_home_test
        - task_key: accepted_values_zzz_game_details_home__Amsterdam__San_Francisco__Seattle_test
        - task_key: not_null_zzz_game_details_visitor_test
        - task_key: accepted_values_zzz_game_details_visitor__Amsterdam__San_Francisco__Seattle_test
        - task_key: not_null_zzz_game_details_home_score_test
        - task_key: not_null_zzz_game_details_visitor_score_test
        - task_key: not_null_zzz_game_details_winner_test
        - task_key: accepted_values_zzz_game_details_winner__Amsterdam__San_Francisco__Seattle_test
        - task_key: not_null_zzz_game_details_date_test
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.zzz_win_loss_records
      - task_key: unique_zzz_win_loss_records_team_test
        depends_on:
        - task_key: zzz_win_loss_records_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.unique_zzz_win_loss_records_team
      - task_key: not_null_zzz_win_loss_records_team_test
        depends_on:
