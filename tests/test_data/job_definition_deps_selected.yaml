        environment_key: Default
        depends_on:
        - task_key: zzz_game_details_test_zzz_game_details_check_scores
        - task_key: zzz_game_details_test_zzz_game_details_check_dates
        - task_key: zzz_game_details_test_unique_zzz_game_details_game_id
        - task_key: zzz_game_details_test_not_null_zzz_game_details_game_id
        - task_key: zzz_game_details_test_not_null_zzz_game_details_home
        - task_key: zzz_game_details_test_accepted_values_zzz_game_details_home__Amsterdam__San_Francisco__Seattle
