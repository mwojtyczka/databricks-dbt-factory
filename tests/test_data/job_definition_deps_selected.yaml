resources:
  jobs:
    dbt_sql_job:
      name: dbt_job
      git_source:
        git_url: https://github.com/mwojtyczka/dbt-demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
      - environment_key: Default
        spec:
          client: '1'
          dependencies:
          - dbt-databricks
      tasks:
      - task_key: diamonds_list_colors
        dbt_task:
          commands:
          - dbt run --select diamonds_list_colors --target dev
          source: GIT
        environment_key: Default
        depends_on:
        - task_key: diamonds_four_cs
      - task_key: diamonds_prices
        dbt_task:
          commands:
          - dbt deps --target dev
          - dbt run --select diamonds_prices --target dev
          source: GIT
        environment_key: Default
        depends_on: []
      - task_key: diamonds_four_cs
        dbt_task:
          commands:
          - dbt run --select diamonds_four_cs --target dev
          source: GIT
        environment_key: Default
        depends_on: []
      - task_key: zzz_game_details
        dbt_task:
          commands:
          - dbt run --select zzz_game_details --target dev
          source: GIT
        environment_key: Default
        depends_on: []
      - task_key: second_dbt_model
        dbt_task:
          commands:
          - dbt deps --target dev
          - dbt run --select second_dbt_model --target dev
          source: GIT
        environment_key: Default
        depends_on:
        - task_key: first_dbt_model_test_unique_first_dbt_model_id
        - task_key: first_dbt_model_test_not_null_first_dbt_model_id
      - task_key: first_dbt_model
        dbt_task:
          commands:
          - dbt run --select first_dbt_model --target dev
          source: GIT
        environment_key: Default
        depends_on: []
      - task_key: zzz_game_details_test_zzz_game_details_check_scores
        dbt_task:
          commands:
          - dbt test --select zzz_game_details_check_scores --target dev
          source: GIT
        environment_key: Default
        depends_on:
        - task_key: zzz_game_details
      - task_key: zzz_game_details_test_zzz_game_details_check_dates
        dbt_task:
          commands:
          - dbt test --select zzz_game_details_check_dates --target dev
          source: GIT
        environment_key: Default
        depends_on:
        - task_key: zzz_game_details
      - task_key: zzz_win_loss_records_test_zzz_win_loss_records_check_records
        dbt_task:
          commands:
          - dbt test --select zzz_win_loss_records_check_records --target dev
          source: GIT
        environment_key: Default
        depends_on:
        - task_key: zzz_win_loss_records
      - task_key: diamonds_list_colors_test_diamonds_list_colors_test
        dbt_task:
          commands:
          - dbt test --select diamonds_list_colors_test --target dev
          source: GIT
        environment_key: Default
        depends_on:
        - task_key: diamonds_list_colors
      - task_key: seed_country_codes
        dbt_task:
