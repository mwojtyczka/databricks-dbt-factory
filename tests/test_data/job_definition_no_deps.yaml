resources:
  jobs:
    dbt_sql_job:
      name: dbt_job
      git_source:
        git_url: https://github.com/mwojtyczka/dbt-demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
      - environment_key: Default
        spec:
          client: '1'
          dependencies:
          - dbt-databricks
      tasks:
      - task_key: diamonds_list_colors_run
        depends_on:
        - task_key: diamonds_four_cs_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.diamonds_list_colors --target dev
          source: GIT
      - task_key: diamonds_prices_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.diamonds_prices --target dev
          source: GIT
      - task_key: diamonds_four_cs_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.diamonds_four_cs --target dev
          source: GIT
      - task_key: zzz_game_details_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.zzz_game_details --target dev
          source: GIT
      - task_key: second_dbt_model_run
        depends_on:
        - task_key: first_dbt_model_run
        - task_key: unique_first_dbt_model_id_test
        - task_key: not_null_first_dbt_model_id_test
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model2.second_dbt_model --target dev
          source: GIT
      - task_key: first_dbt_model_run
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model2.first_dbt_model --target dev
          source: GIT
      - task_key: zzz_game_details_check_scores_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.zzz_game_details_check_scores --target dev
          source: GIT
      - task_key: zzz_game_details_check_dates_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.zzz_game_details_check_dates --target dev
          source: GIT
      - task_key: zzz_win_loss_records_check_records_test
        depends_on:
        - task_key: zzz_win_loss_records_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.zzz_win_loss_records_check_records --target dev
          source: GIT
      - task_key: diamonds_list_colors_test_test
        depends_on:
        - task_key: diamonds_list_colors_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.data_tests.diamonds_list_colors_test --target dev
          source: GIT
      - task_key: country_codes_seed
        depends_on: []
        environment_key: Default
        dbt_task:
          commands:
          - dbt seed --select dbt_demo.country_codes --target dev
          source: GIT
      - task_key: unique_zzz_game_details_game_id_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.unique_zzz_game_details_game_id --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_game_id_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_game_id --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_home_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_home --target dev
          source: GIT
      - task_key: accepted_values_zzz_game_details_home__Amsterdam__San_Francisco__Seattle_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.accepted_values_zzz_game_details_home__Amsterdam__San_Francisco__Seattle --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_visitor_test
