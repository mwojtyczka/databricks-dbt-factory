          commands:
          - dbt test --select dbt_demo.models.sql_model2.not_null_second_dbt_model_id --target dev
          source: GIT
      - task_key: not_null_second_dbt_model_amount_usd_test
        depends_on:
        - task_key: second_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.not_null_second_dbt_model_amount_usd --target dev
          source: GIT
      - task_key: changed_country_run
        depends_on:
        - task_key: country_snapshot_snapshot
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.changed_country --target dev
          source: GIT
      - task_key: dbt_demo_country_run
        depends_on:
        - task_key: country_codes_seed
        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_demo.sql_model1.country --target dev
          source: GIT
      - task_key: country_snapshot_snapshot
        depends_on:
        - task_key: dbt_demo_country_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt snapshot --select dbt_demo.country_snapshot.country_snapshot --target dev
          source: GIT
      - task_key: zzz_win_loss_records_run
        depends_on:
        - task_key: zzz_game_details_run
        - task_key: zzz_game_details_check_scores_test
        - task_key: zzz_game_details_check_dates_test
        - task_key: unique_zzz_game_details_game_id_test
        - task_key: not_null_zzz_game_details_game_id_test
        - task_key: not_null_zzz_game_details_home_test
