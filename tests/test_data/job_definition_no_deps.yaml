        environment_key: Default
        dbt_task:
          commands:
          - dbt run --select dbt_util.country --target dev
          source: GIT
      - task_key: unit_test_dbt_demo_diamonds_list_colors_test_get_distinct_colors
        depends_on:
        - task_key: diamonds_list_colors_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.diamonds_list_colors.test_get_distinct_colors --target dev
          source: GIT
