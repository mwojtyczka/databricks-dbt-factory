      - task_key: not_null_first_dbt_model_id_test
        depends_on:
        - task_key: first_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model2.not_null_first_dbt_model_id --target dev
          source: GIT
      - task_key: unique_second_dbt_model_id_test
        depends_on:
        - task_key: second_dbt_model_run
        environment_key: Default
        dbt_task:
          commands:
