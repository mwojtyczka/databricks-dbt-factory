          - dbt test --select dbt_demo.models.sql_model1.accepted_values_zzz_game_details_visitor__Amsterdam__San_Francisco__Seattle --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_home_score_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_home_score --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_visitor_score_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_visitor_score --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_winner_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.not_null_zzz_game_details_winner --target dev
          source: GIT
      - task_key: accepted_values_zzz_game_details_winner__Amsterdam__San_Francisco__Seattle_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
          - dbt test --select dbt_demo.models.sql_model1.accepted_values_zzz_game_details_winner__Amsterdam__San_Francisco__Seattle --target dev
          source: GIT
      - task_key: not_null_zzz_game_details_date_test
        depends_on:
        - task_key: zzz_game_details_run
        environment_key: Default
        dbt_task:
          commands:
