resources:
  jobs:
    dbt_sql_job:
      name: dbt_job
      git_source:
        git_url: https://github.com/mwojtyczka/dbt-demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
      - environment_key: Default
        spec:
          client: '1'
          dependencies:
          - dbt-databricks
      tasks:
      - task_key: diamonds_list_colors
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select diamonds_list_colors"]'
        environment_key: Default
        depends_on:
        - task_key: diamonds_four_cs
      - task_key: diamonds_prices
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select diamonds_prices"]'
        environment_key: Default
        depends_on: []
      - task_key: diamonds_four_cs
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select diamonds_four_cs"]'
        environment_key: Default
        depends_on: []
      - task_key: zzz_game_details
