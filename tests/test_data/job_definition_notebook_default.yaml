          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt test --select zzz_game_details_check_scores"]'
        environment_key: Default
        depends_on:
        - task_key: zzz_game_details
      - task_key: zzz_game_details_test_zzz_game_details_check_dates
