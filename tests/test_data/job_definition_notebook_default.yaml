resources:
  jobs:
    dbt_sql_job:
      name: dbt_job
      git_source:
        git_url: https://github.com/mwojtyczka/dbt-demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
      - environment_key: Default
        spec:
          client: '1'
          dependencies:
          - dbt-databricks
      tasks:
      - task_key: diamonds_list_colors
        depends_on:
        - task_key: diamonds_four_cs
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select diamonds_list_colors"]'
      - task_key: diamonds_prices
        depends_on: []
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select diamonds_prices"]'
      - task_key: diamonds_four_cs
        depends_on: []
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select diamonds_four_cs"]'
      - task_key: zzz_game_details
        depends_on: []
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select zzz_game_details"]'
      - task_key: second_dbt_model
        depends_on:
        - task_key: first_dbt_model_tests
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select second_dbt_model"]'
      - task_key: first_dbt_model
        depends_on: []
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select first_dbt_model"]'
      - task_key: seed_country_codes
        depends_on: []
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt seed --select country_codes"]'
      - task_key: changed_country
        depends_on:
        - task_key: snapshot_country_snapshot
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select changed_country"]'
      - task_key: country
        depends_on:
        - task_key: seed_country_codes
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select country"]'
      - task_key: snapshot_country_snapshot
        depends_on:
        - task_key: country
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt snapshot --select country_snapshot"]'
      - task_key: zzz_win_loss_records
        depends_on:
        - task_key: zzz_game_details_tests
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select zzz_win_loss_records"]'
      - task_key: diamonds_list_colors_tests
        depends_on:
        - task_key: diamonds_list_colors
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt test --select diamonds_list_colors"]'
      - task_key: first_dbt_model_tests
        depends_on:
        - task_key: first_dbt_model
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt test --select first_dbt_model"]'
      - task_key: second_dbt_model_tests
        depends_on:
        - task_key: second_dbt_model
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt test --select second_dbt_model"]'
      - task_key: zzz_game_details_tests
        depends_on:
        - task_key: zzz_game_details
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt test --select zzz_game_details"]'
      - task_key: zzz_win_loss_records_tests
        depends_on:
        - task_key: zzz_win_loss_records
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt test --select zzz_win_loss_records"]'
