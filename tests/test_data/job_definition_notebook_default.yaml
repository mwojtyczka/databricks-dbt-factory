          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select zzz_game_details"]'
        environment_key: Default
        depends_on: []
      - task_key: second_dbt_model
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select second_dbt_model"]'
        environment_key: Default
        depends_on:
        - task_key: first_dbt_model_test_unique_first_dbt_model_id
        - task_key: first_dbt_model_test_not_null_first_dbt_model_id
