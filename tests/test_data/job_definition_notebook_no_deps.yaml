          dependencies:
          - dbt-databricks
      tasks:
      - task_key: model_dbt_demo_diamonds_list_colors
        depends_on:
        - task_key: model_dbt_demo_diamonds_four_cs
        environment_key: Default
        notebook_task:
          notebook_path: ./notebooks/dbt_runner.py
          base_parameters:
            dbt_commands: '["dbt run --select dbt_demo.sql_model1.diamonds_list_colors --target dev"]'
          source: GIT
      - task_key: model_dbt_demo_diamonds_prices
